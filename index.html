<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1,
viewport-fit=cover">

<title>Radar Cuaca Smart Farm</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/heatmap.js/2.0.0/heatmap.min.js"></script>

<script src="https://raw.githack.com/pa7/heatmap.js/master/plugins/leaflet-heatmap/leaflet-heatmap.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#08111f;
    font-family:Segoe UI,sans-serif;
}

/* =========================
   MAP
========================= */

#map{
    position:fixed;
    inset:0;
    width:100%;
    height:100vh;
    height:100dvh;
    z-index:1;
}

/* =========================
   FORECAST PANEL
========================= */

.forecast{

    position:absolute;

    left:15px;
    right:auto;
    bottom:15px;

    z-index:9999;

    width:420px;

    background:rgba(8,15,30,0.92);

    -webkit-backdrop-filter:blur(20px);
    backdrop-filter:blur(20px);

    border-radius:24px;

    border:1px solid rgba(255,255,255,0.06);

    padding:16px;

    box-sizing:border-box;

    color:white;

    overflow:visible;
}

.forecast-title{
    font-size:1rem;
    font-weight:700;
    color:#71f7ff;
    margin-bottom:14px;
}

/* =========================
   IOS FIX BESAR
========================= */

.chart-container{

    position:relative;

    width:100%;

    height:260px;

    min-height:260px;

    overflow:visible;
}

/* CANVAS PAKSA PENUH */

#forecastChart{

    position:absolute !important;

    inset:0 !important;

    width:100% !important;

    height:100% !important;

    display:block !important;
}

/* =========================
   LEGEND
========================= */

.legend{
    margin-top:14px;
}

.gradient{
    width:100%;
    height:10px;

    border-radius:999px;

    background:linear-gradient(
        to right,
        rgba(0,140,255,0.15) 0%,
        #00ff88 30%,
        #ffd000 65%,
        #ff0000 100%
    );
}

.scale{
    display:flex;
    justify-content:space-between;
    margin-top:6px;
    font-size:.62rem;
}

/* =========================
   MOBILE IOS SUPER FIX
========================= */

@media(max-width:768px){

    .forecast{

        left:10px !important;
        right:10px !important;

        width:auto !important;

        bottom:10px !important;

        padding:16px 14px !important;

        border-radius:22px !important;
    }

    .forecast-title{

        font-size:.92rem !important;

        margin-bottom:12px !important;
    }

    /* INI YANG MEMPERBESAR CHART */

    .chart-container{

        height:38vh !important;

        min-height:100px !important;

        max-height:200px !important;
    }

    .scale{
        font-size:.55rem !important;
    }

    .leaflet-control-zoom{
        margin-bottom:430px !important;
    }

}

</style>
</head>

<body>

<div id="map"></div>

<div class="forecast">

    <div class="forecast-title">
        📈 Forecast Perubahan Cuaca Hujan 24 Jam
    </div>

    <div class="chart-container">
        <canvas id="forecastChart"></canvas>
    </div>

    <div class="legend">

        <div class="gradient"></div>

        <div class="scale">
            <span>🔵 Tipis</span>
            <span>🟢 Berawan</span>
            <span>🟡 Mendung</span>
            <span>🔴 Pekat</span>
        </div>

    </div>

</div>

<script>

/* =========================
   PARAMETER
========================= */

const urlParams = new URLSearchParams(window.location.search);

const lat =
parseFloat(urlParams.get('lat')) || -4.1200;

const lon =
parseFloat(urlParams.get('lon')) || 120.0300;

/* =========================
   MAP
========================= */

const map = L.map('map',{
    zoomControl:false
}).setView([lat, lon], 12);

L.control.zoom({
    position:'bottomright'
}).addTo(map);

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
{
    attribution:'© OpenStreetMap'
}
).addTo(map);

/* =========================
   MARKER
========================= */

L.marker([lat, lon])
.addTo(map)
.bindPopup('📍 Titik Sawah');

/* =========================
   CIRCLE
========================= */

L.circle([lat, lon],{

    radius:12000,

    color:'#71f7ff',

    fillColor:'#71f7ff',

    fillOpacity:0.02,

    weight:1.5

}).addTo(map);

/* =========================
   HEATMAP
========================= */

const cfg = {

    radius:0.05,

    maxOpacity:0.65,

    scaleRadius:true,

    useLocalExtrema:false,

    latField:'lat',

    lngField:'lng',

    valueField:'count',

    gradient:{
        0.15:'rgba(0,140,255,0.15)',
        0.35:'#00ff88',
        0.65:'#ffd000',
        1.00:'#ff0000'
    }

};

const heatmapLayer =
new HeatmapOverlay(cfg);

heatmapLayer.addTo(map);

/* =========================
   CHART
========================= */

const ctx =
document.getElementById('forecastChart');

const forecastChart =
new Chart(ctx,{

    type:'line',

    data:{
        labels:[],
        datasets:[{

            data:[],

            borderColor:'#00ff88',

            backgroundColor:'rgba(0,255,136,0.12)',

            fill:true,

            tension:0.45,

            borderWidth:3,

            pointRadius:2,

            pointHoverRadius:6

        }]
    },

    options:{

        responsive:true,

        maintainAspectRatio:false,

        animation:false,

        plugins:{

            legend:{
                display:false
            }

        },

        scales:{

            x:{

                ticks:{
                    color:'#fff',
                    font:{
                        size:10,
                        weight:'bold'
                    },
                    maxRotation:0
                },

                grid:{
                    color:'rgba(255,255,255,0.05)'
                }

            },

            y:{

                beginAtZero:true,

                ticks:{
                    color:'#fff',
                    font:{
                        size:10,
                        weight:'bold'
                    }
                },

                grid:{
                    color:'rgba(255,255,255,0.05)'
                }

            }

        }

    }

});

/* =========================
   LOAD DATA
========================= */

async function loadData(){

    try{

        const step = 0.04;

        let lats = [];
        let lons = [];

        for(let i=-3;i<=3;i++){

            for(let j=-3;j<=3;j++){

                lats.push(
                    parseFloat((lat+i*step).toFixed(4))
                );

                lons.push(
                    parseFloat((lon+j*step).toFixed(4))
                );

            }

        }

        const api =
        `https://api.open-meteo.com/v1/forecast?`+
        `latitude=${lats.join(',')}`+
        `&longitude=${lons.join(',')}`+
        `&hourly=cloud_cover,rain`+
        `&timezone=auto`;

        const res = await fetch(api);

        const responses = await res.json();

        const center = responses[0];

        forecastChart.data.labels =
        center.hourly.time.slice(0,24).map(t => {

            return t.split("T")[1].slice(0,5);

        });

        forecastChart.data.datasets[0].data =
        center.hourly.rain.slice(0,24);

        forecastChart.update();

        /* IOS FORCE */

        setTimeout(()=>{

            forecastChart.resize();

            map.invalidateSize();

        },400);

        /* RADAR */

        let radarData = [];

        const activeIndex = 0;

        lats.forEach((gridLat,index)=>{

            const item = responses[index];

            const cloudVal =
            item.hourly.cloud_cover[activeIndex] || 0;

            radarData.push({

                lat:gridLat,

                lng:lons[index],

                count:cloudVal/100

            });

        });

        heatmapLayer.setData({

            max:1,

            data:radarData

        });

    }

    catch(err){

        console.error(err);

    }

}

loadData();

setInterval(loadData,300000);

/* =========================
   IOS FINAL FORCE
========================= */

window.addEventListener('load',()=>{

    setTimeout(()=>{

        forecastChart.resize();

        forecastChart.update();

        map.invalidateSize();

    },1000);

});

</script>

</body>
</html>
