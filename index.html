<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Smart Farm Cloud Radar Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/heatmap.js/2.0.0/heatmap.min.js"></script>
<script src="https://raw.githack.com/pa7/heatmap.js/master/plugins/leaflet-heatmap/leaflet-heatmap.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Segoe UI,sans-serif;
    background:#08111f;
}

#map{
    width:100%;
    height:100dvh;
}

/* =========================
   FORECAST PANEL (DESKTOP)
========================= */

.forecast{
    position:absolute;
    bottom:15px;
    left:15px;
    z-index:1100;
    width:420px;
    background:rgba(8,15,30,0.85);
    backdrop-filter:blur(22px);
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.06);
    padding:14px;
    color:white;
    box-sizing: border-box;
}

.forecast-title{
    margin-top: 5px;
    margin-bottom:10px;
    font-weight:700;
    text-align:center;
    font-size: 0.9rem;
}

/* Wrapper Utama Grafik */
.chart-container {
    position: relative;
    width: 100%;
    height: 180px;
}

/* =========================
   LEGENDA RADAR (DESKTOP)
========================= */

.legend{
    width: 100%;
    box-sizing: border-box;
    padding: 0px 4px;
    margin-bottom: 5px;
}

.legend-title{
    font-weight:700;
    text-align:center;
    font-size:.8rem;
    margin-bottom: 8px;
    color: #71f7ff;
}

.gradient{
    width:100%;
    height:12px;
    border-radius:999px;
    background:linear-gradient(
        to right,
        rgba(0,140,255,0.15) 0%,   
        #00ff88 30%,              
        #ffd000 65%,              
        #ff0000 100%              
    );
}

.scale{
    display:flex;
    justify-content:space-between;
    margin-top:6px;
    font-size:.62rem;
    opacity: 0.9;
}

/* =========================
   MOBILE UI RESPONSIVE (PAS DENGAN LEBAR FRAME)
========================= */

@media(max-width:768px){

    #map{
        height:100dvh;
    }

    .forecast{
        left:10px;
        right:10px;
        width:auto; 
        bottom:10px;
        padding:12px 14px; /* Padding disesuaikan */
        border-radius:16px;
        z-index: 1100;
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .forecast-title{
        font-size:.85rem;
        margin-bottom: 2px;
        text-align: left;
        padding-left: 4px; /* Sejajar dengan teks legenda */
    }

    /* TINGGI GRAFIK MAKSIMAL & LEBAR FULL 100% */
    .chart-container {
        width: 100%;
        height: 100px; /* Ditambah tingginya agar kurva makin puas dilihat */
        margin-left: 0px;
        margin-right: 0px;
    }

    .legend{
        padding: 0px 4px;
    }
    
    .legend-title{
        font-size: .8rem;
        margin-bottom: 6px;
        text-align: center;
    }

    .gradient {
        width: 100%;
    }
    
    .scale {
        width: 100%;
        font-size:.58rem;
    }

    /* Sesuaikan posisi tombol zoom Leaflet agar tidak mentok */
    .leaflet-control-zoom{
        margin-bottom:350px !important;
        transform:scale(.85);
    }

}

</style>
</head>

<body>

<div id="map"></div>

<div class="forecast">
    
    <div class="legend">
        <div class="legend-title">🛰 DATA SKALA RADAR AWAN</div>
        <div class="gradient"></div>
        <div class="scale">
            <span>Awan Tipis</span>
            <span>Berawan</span>
            <span>Mendung</span>
            <span>Pekat (Siaga)</span>
        </div>
    </div>
    
    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.08); margin: 4px 0; width: 100%;">

    <div class="forecast-title">
        📈 Forecast Hujan 24 Jam
    </div>
    
    <div class="chart-container">
        <canvas id="forecastChart"></canvas>
    </div>
</div>

<script>

/* =========================
   LOCATION PARAMS
========================= */

const urlParams = new URLSearchParams(window.location.search);
const lat = parseFloat(urlParams.get('lat')) || -4.1200;
const lon = parseFloat(urlParams.get('lon')) || 120.0300;

/* =========================
   LEAFLET MAP INITIALIZATION
========================= */

const map = L.map('map',{
    zoomControl:false
}).setView([lat, lon], 12);

L.control.zoom({
    position:'bottomright'
}).addTo(map);

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
{
    attribution:'© OpenStreetMap'
}
).addTo(map);

/* MARKER TITIK SAWAH */
L.marker([lat, lon])
.addTo(map)
.bindPopup('📍 Titik Lahan Sawah');

/* LINGKARAN JANGKAUAN RADAR 12 KM */
L.circle([lat, lon],{
    radius:12000,
    color:'#71f7ff', 
    fillColor:'#71f7ff',
    fillOpacity:0.02,
    weight:1.5
}).addTo(map);

/* =========================
   HEATMAP MATRIX LAYER (SKEMA WARNA BMKG)
========================= */

const cfg = {
    radius:0.05, 
    maxOpacity:0.65, 
    scaleRadius:true,
    useLocalExtrema:false,
    latField:'lat',
    lngField:'lng',
    valueField:'count',
    gradient:{
        0.15:'rgba(0,140,255,0.15)', 
        0.35:'#00ff88',              
        0.65:'#ffd000',              
        1.00:'#ff0000'               
    }
};

const heatmapLayer = new HeatmapOverlay(cfg);
heatmapLayer.addTo(map);

/* =========================
   FORECAST CHART (CHART.JS SUDAH DI-STRETCH FULL-WIDTH)
========================= */

const ctx = document.getElementById('forecastChart');
const forecastChart = new Chart(ctx,{
    type:'line',
    data:{
        labels:[],
        datasets:[{
            label:'Curah Hujan (mm)',
            data:[],
            tension:0.4,
            borderColor:'#00ff88',
            backgroundColor:'rgba(0,255,136,0.15)',
            fill:true,
            pointRadius: 2,
            pointHoverRadius: 5
        }]
    },
    options:{
        responsive:true,
        maintainAspectRatio:false,
        layout: {
            padding: { 
                left: -5,  // Memaksa chart mepet ke dinding kiri kontainer
                right: 0,  // Memaksa chart mepet ke dinding kanan kontainer
                top: 5, 
                bottom: 0 
            }
        },
        plugins:{
            legend:{ display: false },
            tooltip: { mode: 'index', intersect: false }
        },
        scales:{
            x:{ 
                ticks:{ 
                    color:'white',
                    font: { size: 9 },
                    maxRotation: 0,
                    minRotation: 0,
                    autoSkip: true,
                    maxTicksLimit: 6
                },
                grid: { color: 'rgba(255, 255, 255, 0.04)' }
            },
            y:{ 
                ticks:{ 
                    color:'white',
                    font: { size: 9 },
                    beginAtZero: true
                },
                grid: { color: 'rgba(255, 255, 255, 0.04)' }
            }
        }
    }
});

/* =========================
   ASYNC FETCH DATA SATELIT AWAN
========================= */

async function loadData(){
    try{
        const step = 0.04; 
        let lats = [];
        let lons = [];

        for(let i=-3; i<=3; i++){
            for(let j=-3; j<=3; j++){
                lats.push(parseFloat((lat + i*step).toFixed(4)));
                lons.push(parseFloat((lon + j*step).toFixed(4)));
            }
        }

        const api =
        `https://api.open-meteo.com/v1/forecast?`+
        `latitude=${lats.join(',')}`+
        `&longitude=${lons.join(',')}`+
        `&hourly=cloud_cover,rain`+ 
        `&timezone=auto`;

        const res = await fetch(api);
        const responses = await res.json();
        
        const sekarang = new Date();
        const jamSekarangISO = sekarang.toISOString().slice(0, 13) + ":00"; 
        
        const center = responses[0];
        const times = center.hourly.time;
        let activeIndex = times.findIndex(t => t.startsWith(jamSekarangISO.slice(0,13)));
        if (activeIndex === -1) activeIndex = 0;

        /* UPDATE GRAFIK FORECAST */
        forecastChart.data.labels = center.hourly.time.slice(0,24).map(t => {
            const jamMenit = t.split("T")[1];
            const bagian = jamMenit.split(":");
            return `${bagian[0]}:${bagian[1]}`;
        });
        forecastChart.data.datasets[0].data = center.hourly.rain.slice(0,24);
        forecastChart.update();

        /* UPDATE MATRIKS RADAR AWAN ASIMETRIS */
        let radarData = [];
        lats.forEach((gridLat, index) => {
            const item = responses[index];
            const cloudVal = item.hourly.cloud_cover[activeIndex] || 0; 
            
            let valNormalized = cloudVal / 100;
            valNormalized = Math.min(valNormalized, 1);

            radarData.push({
                lat: gridLat,
                lng: lons[index],
                count: valNormalized 
            });
        });

        heatmapLayer.setData({
            max: 1,
            data: radarData
        });

    } catch(err){
        console.error("Gagal memperbarui radar spasial tutupan awan:", err);
    }
}

loadData();
setInterval(loadData,300000);

</script>

</body>
</html>
