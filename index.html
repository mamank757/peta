<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Smart Farm Weather Satellite Radar</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Segoe UI,sans-serif;
    background:#060b13;
}

#map{
    width:100%;
    height:100dvh;
    z-index: 1;
}

/* =========================
   MODE SWITCHER CONTROLLER
========================= */

.radar-modes{
    position: absolute;
    top: 15px;
    left: 15px;
    right: 15px;
    z-index: 1200;
    display: flex;
    gap: 8px;
    justify-content: center;
}

.mode-btn {
    background: rgba(11, 22, 44, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.7);
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
}
.mode-btn.active {
    background: #00ff88;
    color: #060b13;
    border-color: #00ff88;
    box-shadow: 0 0 12px rgba(0, 255, 136, 0.4);
}

/* =========================
   FORECAST PANEL CONTAINER
========================= */

.forecast{
    position:absolute;
    bottom:15px;
    left:15px;
    z-index:1100;
    width:430px;
    background:rgba(8,15,30,0.92);
    backdrop-filter:blur(22px);
    border-radius:24px;
    border:1px solid rgba(255,255,255,0.08);
    padding:16px;
    color:white;
    box-sizing: border-box;
    transition: all 0.3s ease-in-out;
}

.forecast-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
}

.forecast-title-block {
    display: flex;
    align-items: center;
    gap: 8px;
}

.forecast-title{
    font-weight:800;
    font-size: 0.9rem;
    color: #71f7ff;
    letter-spacing: 0.5px;
}

.toggle-btn {
    background: none;
    border: none;
    color: #71f7ff;
    font-size: 0.85rem;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.3s ease;
}

.radar-status-badge {
    background: rgba(0, 255, 136, 0.1);
    border: 1px solid rgba(0, 255, 136, 0.2);
    color: #00ff88;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
}

.collapsible-content {
    max-height: 300px;
    overflow: hidden;
    transition: max-height 0.3s ease-in-out, opacity 0.2s ease-in-out;
    opacity: 1;
}

.forecast.collapsed .collapsible-content {
    max-height: 0px !important;
    opacity: 0;
    pointer-events: none;
}

.forecast.collapsed .toggle-btn {
    transform: rotate(-180deg);
}

.chart-container {
    position: relative;
    width: 100% !important;
    height: 240px !important;
    display: block !important;
    margin-top: 10px;
}
#forecastChart {
    width: 100% !important;
    height: 240px !important;
}

/* =========================
   LEGENDA RADAR STYLE
========================= */

.legend{
    width: 100%;
    box-sizing: border-box;
    margin-top: 12px;
}

.gradient{
    width:100%;
    height:8px;
    border-radius:999px;
    transition: background 0.3s ease;
}

.scale{
    display:flex;
    justify-content:space-between;
    margin-top:5px;
    font-size:.6rem;
    opacity: 0.8;
}

/* =========================
   RESPONSIVE MOBILE CONTROLLER
========================= */

@media(max-width:768px){
    .radar-modes {
        top: 10px; left: 10px; right: 10px; gap: 6px;
    }
    .mode-btn { padding: 8px 16px; font-size: 0.75rem; flex: 1; text-align: center; }

    .forecast{
        left:10px !important; right:10px !important;
        width: calc(100% - 20px) !important;
        bottom:10px !important;
        padding: 12px 10px !important;
        border-radius: 20px !important;
    }
    
    .forecast-title { font-size: 0.8rem !important; }

    .chart-container, #forecastChart {
        height: 240px !important;
    }

    .legend { margin-top: 10px !important; }
    .scale { font-size: 0.55rem !important; }

    .leaflet-control-zoom {
        margin-bottom: 390px !important;
        transition: margin-bottom 0.3s ease-in-out;
        transform: scale(0.8) !important;
    }
    
    body:has(.forecast.collapsed) .leaflet-control-zoom {
        margin-bottom: 75px !important;
    }
}

</style>
</head>

<body>

<div class="radar-modes">
    <button class="mode-btn active" onclick="switchRadarLayer('awan', this)">☁ Satelit Awan</button>
    <button class="mode-btn" onclick="switchRadarLayer('hujan', this)">🌧 Satelit Hujan</button>
</div>

<div id="map"></div>

<div class="forecast" id="forecastPanel">
    <div class="forecast-header" onclick="toggleForecast()">
        <div class="forecast-title-block">
            <button class="toggle-btn" id="arrowBtn">▼</button>
            <div class="forecast-title">📈 Forecast Curah Hujan 24 Jam</div>
        </div>
        <div class="radar-status-badge" id="radarBadge">Awan</div>
    </div>
    
    <div class="collapsible-content">
        <div class="chart-container">
            <canvas id="forecastChart"></canvas>
        </div>

        <div class="legend">
            <div class="gradient" id="legendGradient"></div>
            <div class="scale" id="legendScale"></div>
        </div>
    </div>
</div>

<script>

/* =========================
   LOCATION & CREDENTIALS
========================= */
const urlParams = new URLSearchParams(window.location.search);
const lat = parseFloat(urlParams.get('lat')) || -4.1200;
const lon = parseFloat(urlParams.get('lon')) || 120.0300;

const owmApiKey = "a6da7e4d60b79f9bc5e5a35f7ccc5885"; 

let activeLayerName = 'awan';
let owmTileLayers = {};

/* =========================
   TOGGLE COLLAPSE FUNCTION
========================= */
function toggleForecast() {
    const panel = document.getElementById('forecastPanel');
    panel.classList.toggle('collapsed');
    setTimeout(() => {
        forecastChart.resize();
    }, 310);
}

/* =========================
   LEAFLET MAP INITIALIZATION
========================= */
const map = L.map('map',{ zoomControl:false }).setView([lat, lon], 10); 
L.control.zoom({ position:'bottomright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'© OpenStreetMap'
}).addTo(map);

L.marker([lat, lon]).addTo(map).bindPopup('📍 Lokasi Sawah Pengguna');

owmTileLayers['awan'] = L.tileLayer(`https://tile.openweathermap.org/map/clouds/{z}/{x}/{y}.png?appid=${owmApiKey}`, { opacity: 0.55 });
owmTileLayers['hujan'] = L.tileLayer(`https://tile.openweathermap.org/map/precipitation_cls/{z}/{x}/{y}.png?appid=${owmApiKey}`, { opacity: 0.70 });

owmTileLayers['awan'].addTo(map);

/* =========================
   FUNGSI UPDATE LEGENDA RADAR - DIKOREKSI TOTAL
========================= */
function updateLegendUI(mode) {
    const gradientDiv = document.getElementById('legendGradient');
    const scaleDiv = document.getElementById('legendScale');

    if (mode === 'awan') {
        gradientDiv.style.background = "linear-gradient(to right, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0.9) 100%)";
        scaleDiv.innerHTML = "<span>Cerah / Polos</span><span>Berawan Tipis</span><span>Mendung Pekat</span>";
    } else if (mode === 'hujan') {
        // KOREKSI STRUKTUR WARNA: Memasukkan Biru di bagian awal gradasi agar sinkron dengan peta Anda
        gradientDiv.style.background = "linear-gradient(to right, #1d3ede 0%, #4df33b 30%, #e9ee28 60%, #ef1c1c 85%, #900c3f 100%)";
        scaleDiv.innerHTML = "<span>Gerimis (🔵)</span><span>Ringan (🟢)</span><span>Sedang (🟡)</span><span>Lebat (🟠)</span><span>Ekstrem (🔴)</span>";
    }
}

updateLegendUI('awan');

/* =========================
   TOGGLE SWITCH RADAR SATELIT
========================= */
function switchRadarLayer(mode, element) {
    if (owmTileLayers[activeLayerName]) {
        map.removeLayer(owmTileLayers[activeLayerName]);
    }
    activeLayerName = mode;
    if (owmTileLayers[mode]) {
        owmTileLayers[mode].addTo(map);
    }
    document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
    element.classList.add('active');
    document.getElementById('radarBadge').innerText = mode;

    updateLegendUI(mode);
}

/* =========================
   FORECAST CHART GRAPH (CHART.JS)
========================= */
const ctx = document.getElementById('forecastChart').getContext('2d');
const forecastChart = new Chart(ctx,{
    type:'line',
    data:{
        labels:[],
        datasets:[{
            label:'Prediksi Hujan (mm)',
            data:[],
            tension:0.4,
            borderColor:'#00ff88',
            backgroundColor:'rgba(0,255,136,0.12)',
            fill:true,
            pointRadius: 2
        }]
    },
    options:{
        responsive:true,
        maintainAspectRatio:false,
        aspectRatio: false,
        layout: { padding: { left: -6, right: 4, top: 5, bottom: 0 } },
        plugins:{ legend:{ display: false }, tooltip: { mode: 'index', intersect: false } },
        scales:{
            x:{ ticks:{ color:'rgba(255,255,255,0.8)', font:{ size:9, weight:'bold' }, maxTicksLimit:6 }, grid:{ color:'rgba(255,255,255,0.03)' } },
            y:{ ticks:{ color:'rgba(255,255,255,0.8)', font:{ size:9, weight:'bold' }, beginAtZero:true }, grid:{ color:'rgba(255,255,255,0.03)' } }
        }
    }
});

async function loadForecastMetrics(){
    try {
        const api = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=rain&timezone=auto`;
        const res = await fetch(api);
        const data = await res.json();
        
        forecastChart.data.labels = data.hourly.time.slice(0,24).map(t => t.split("T")[1].slice(0,5));
        forecastChart.data.datasets[0].data = data.hourly.rain.slice(0,24);
        forecastChart.options.maintainAspectRatio = false;
        forecastChart.options.aspectRatio = false;
        forecastChart.update();
        
        setTimeout(() => { forecastChart.resize(); }, 120);
    } catch (err) {
        console.error("Gagal memuat metrik ramalan cuaca:", err);
    }
}

loadForecastMetrics();
setInterval(loadForecastMetrics, 300000);

</script>

</body>
</html>
