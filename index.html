<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Smart Farm Weather Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/heatmap.js/2.0.0/heatmap.min.js"></script>
<script src="https://raw.githack.com/pa7/heatmap.js/master/plugins/leaflet-heatmap/leaflet-heatmap.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Segoe UI,sans-serif;
    background:#08111f;
}

#map{
    width:100%;
    height:100dvh;
}

/* =========================
   FORECAST PANEL (BAWAH)
========================= */

.forecast{
    position:absolute;
    bottom:15px;
    left:15px;
    z-index:1000;
    width:420px;
    background:rgba(8,15,30,0.78);
    backdrop-filter:blur(18px);
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.06);
    padding:14px;
    color:white;
}

.forecast-title{
    margin-bottom:10px;
    font-weight:700;
    text-align:center;
}

canvas{
    max-height:180px;
}

/* =========================
   MOBILE UI RESPONSIVE
========================= */

@media(max-width:768px){

    #map{
        height:100dvh;
    }

    .forecast{
        left:10px;
        right:10px;
        width:auto;
        bottom:15px;
        padding:10px;
        border-radius:16px;
    }

    .forecast-title{
        font-size:.8rem;
    }

    canvas{
        max-height:120px;
    }

    .leaflet-control-zoom{
        margin-bottom:180px !important;
        transform:scale(.9);
    }

}

</style>
</head>

<body>

<div id="map"></div>

<div class="forecast">
    <div class="forecast-title">
        📈 Forecast Hujan 24 Jam
    </div>
    <canvas id="forecastChart"></canvas>
</div>

<script>

/* =========================
   LOCATION PARAMS
========================= */

const urlParams = new URLSearchParams(window.location.search);
const lat = parseFloat(urlParams.get('lat')) || -4.1200;
const lon = parseFloat(urlParams.get('lon')) || 120.0300;

/* =========================
   LEAFLET MAP INITIALIZATION
========================= */

const map = L.map('map',{
    zoomControl:false
}).setView([lat, lon], 10);

L.control.zoom({
    position:'bottomright'
}).addTo(map);

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
{
    attribution:'© OpenStreetMap'
}
).addTo(map);

/* MARKER TITIK SAWAH */
L.marker([lat, lon])
.addTo(map)
.bindPopup('📍 Titik Sawah Pengguna');

/* LINGKARAN JANGKAUAN RADAR (RED CIRCLE EFFECT) */
const cbCircle = L.circle([lat, lon],{
    radius:12000,
    color:'#ff4d4d',
    fillColor:'#ff4d4d',
    fillOpacity:0.08,
    weight:1.5
}).addTo(map);

/* =========================
   HEATMAP MATRIX LAYER
========================= */

const cfg = {
    radius:0.09,
    maxOpacity:0.75,
    scaleRadius:true,
    useLocalExtrema:false,
    latField:'lat',
    lngField:'lng',
    valueField:'count',
    gradient:{
        0.10:'#00ff88',
        0.30:'#c8ff00',
        0.50:'#ffd000',
        0.70:'#ff7b00',
        0.85:'#ff0000',
        1.00:'#ff00ff'
    }
};

const heatmapLayer = new HeatmapOverlay(cfg);
heatmapLayer.addTo(map);

/* =========================
   FORECAST CHART (CHART.JS)
========================= */

const ctx = document.getElementById('forecastChart');
const forecastChart = new Chart(ctx,{
    type:'line',
    data:{
        labels:[],
        datasets:[{
            label:'Curah Hujan (mm)',
            data:[],
            tension:0.4,
            borderColor:'#00ff88',
            backgroundColor:'rgba(0,255,136,0.15)',
            fill:true
        }]
    },
    options:{
        responsive:true,
        maintainAspectRatio:false,
        plugins:{
            legend:{
                labels:{
                    color:'white'
                }
            }
        },
        scales:{
            x:{
                ticks:{
                    color:'white'
                }
            },
            y:{
                ticks:{
                    color:'white'
                }
            }
        }
    }
});

/* =========================
   ASYNC FETCH DATA ATMOSFER
========================= */

async function loadData(){
    try{
        const step = 0.05;
        let lats = [];
        let lons = [];

        // Generate Grid Matrix Spasial di Sekitar Lokasi Utama
        for(let i=-3;i<=3;i++){
            for(let j=-3;j<=3;j++){
                if(Math.abs(i)+Math.abs(j)<=4){
                    lats.push(parseFloat((lat + i*step).toFixed(4)));
                    lons.push(parseFloat((lon + j*step).toFixed(4)));
                }
            }
        }

        const api =
        `https://api.open-meteo.com/v1/forecast?`+
        `latitude=${lats.join(',')}`+
        `&longitude=${lons.join(',')}`+
        `&current=rain`+
        `&hourly=rain`+
        `&timezone=auto`;

        const res = await fetch(api);
        const responses = await res.json();
        const center = responses[0];

        /* UPDATE GRAFIK 24 JAM */
        forecastChart.data.labels = center.hourly.time.slice(0,24).map(t=>t.split("T")[1]);
        forecastChart.data.datasets[0].data = center.hourly.rain.slice(0,24);
        forecastChart.update();

        /* UPDATE MATRIKS GRADASI HEATMAP KELILING */
        let radarData = [];
        lats.forEach((gridLat,index)=>{
            const item = responses[index];
            const rainVal = item.current.rain || 0;
            
            let valNormalized = rainVal / 10;
            valNormalized = Math.min(valNormalized,1);

            radarData.push({
                lat:gridLat,
                lng:lons[index],
                count:valNormalized
            });
        });

        heatmapLayer.setData({
            max:1,
            data:radarData
        });

    } catch(err){
        console.error("Gagal memperbarui matriks radar cuaca:", err);
    }
}

// Eksekusi Pemicu Awal
loadData();

/* AUTO REFRESH RADIUS RADAR TIAP 5 MENIT */
setInterval(loadData,300000);

</script>

</body>
</html>
