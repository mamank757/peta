<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Premium Smart Farm Satellite Radar</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Segoe UI,sans-serif;
    background:#060b13;
}

#map{
    width:100%;
    height:100dvh;
    z-index: 1;
}

/* =========================
   MODE SWITCHER CONTROLLER (ATAS LAYAR)
========================= */

.radar-modes{
    position: absolute;
    top: 15px;
    left: 15px;
    right: 15px;
    z-index: 1200;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 4px;
}
.radar-modes::-webkit-scrollbar { display: none; }

.mode-btn {
    background: rgba(11, 22, 44, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.7);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
}
.mode-btn.active {
    background: #00ff88;
    color: #060b13;
    border-color: #00ff88;
    box-shadow: 0 0 12px rgba(0, 255, 136, 0.4);
}

/* =========================
   FORECAST PANEL CONTAINER (BAWAH LAYAR)
========================= */

.forecast{
    position:absolute;
    bottom:15px;
    left:15px;
    z-index:1100;
    width:430px;
    background:rgba(8,15,30,0.92);
    backdrop-filter:blur(22px);
    border-radius:24px;
    border:1px solid rgba(255,255,255,0.08);
    padding:16px;
    color:white;
    box-sizing: border-box;
}

.forecast-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.forecast-title{
    font-weight:800;
    font-size: 0.9rem;
    color: #71f7ff;
    letter-spacing: 0.5px;
}

.radar-status-badge {
    background: rgba(0, 255, 136, 0.1);
    border: 1px solid rgba(0, 255, 136, 0.2);
    color: #00ff88;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
}

/* PAKSA KUNCI TINGGI MURNI GRAFIK ANTI GEPENG */
.chart-container {
    position: relative;
    width: 100% !important;
    height: 240px !important;
    display: block !important;
}
#forecastChart {
    width: 100% !important;
    height: 240px !important;
}

/* =========================
   LEGENDA SATELIT RADAR
========================= */

.legend{
    width: 100%;
    box-sizing: border-box;
    margin-top: 12px;
}

.gradient{
    width:100%;
    height:8px;
    border-radius:999px;
    background:linear-gradient(to right, rgba(0,140,255,0.15) 0%, #00ff88 33%, #ffd000 66%, #ff0000 100%);
}

.scale{
    display:flex;
    justify-content:space-between;
    margin-top:5px;
    font-size:.6rem;
    opacity: 0.8;
}

/* =========================
   RESPONSIVE MOBILE (ANDROID & iOS SAFARI PASSED)
========================= */

@media(max-width:768px){
    .radar-modes {
        top: 10px; left: 10px; right: 10px; gap: 5px;
    }
    .mode-btn { padding: 8px 12px; font-size: 0.72rem; }

    .forecast{
        left:10px !important; right:10px !important;
        width: calc(100% - 20px) !important;
        bottom:10px !important;
        padding: 12px 10px !important;
        border-radius: 20px !important;
    }
    
    .forecast-title { font-size: 0.8rem !important; }

    /* PAKSA GRAFIK TETAP MELEDAK BESAR DI iOS */
    .chart-container, #forecastChart {
        height: 240px !important;
    }

    .legend { margin-top: 10px !important; }
    .scale { font-size: 0.55rem !important; }

    .leaflet-control-zoom{
        margin-bottom: 390px !important;
        transform: scale(0.8) !important;
    }
}

</style>
</head>

<body>

<div class="radar-modes">
    <button class="mode-btn active" onclick="switchRadarLayer('awan', this)">☁ Satelit Radar Awan</button>
    <button class="mode-btn" onclick="switchRadarLayer('hujan', this)">🌧 Satelit Radar Hujan</button>
    <button class="mode-btn" onclick="switchRadarLayer('angin', this)">💨 Koridor Angin (Grafik)</button>
</div>

<div id="map"></div>

<div class="forecast">
    <div class="forecast-header">
        <div class="forecast-title" id="chartTitle">季度 Forecast Curah Hujan 24 Jam</div>
        <div class="radar-status-badge" id="radarBadge">Awan</div>
    </div>
    
    <div class="chart-container">
        <canvas id="forecastChart"></canvas>
    </div>

    <div class="legend">
        <div class="gradient"></div>
        <div class="scale">
            <span>Rendah / Cerah</span>
            <span>Sedang</span>
            <span>Lebat</span>
            <span>Ekstrem / Badai</span>
        </div>
    </div>
</div>

<script>

/* =========================
   LOCATION & CREDENTIALS
========================= */
const urlParams = new URLSearchParams(window.location.search);
const lat = parseFloat(urlParams.get('lat')) || -4.1200;
const lon = parseFloat(urlParams.get('lon')) || 120.0300;

// MENYUNTIKKAN INTEGRASI API KEY OWM MILIK KING MAMANK
const owmApiKey = "a6da7e4d60b79f9bc5e5a35f7ccc5885"; 

let activeLayerName = 'awan';
let owmTileLayers = {};

/* =========================
   LEAFLET MAP CONTROLLER
========================= */
const map = L.map('map',{ zoomControl:false }).setView([lat, lon], 10); // Zoom 10 agar hamparan wilayah luar kelihatan luas
L.control.zoom({ position:'bottomright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'© OpenStreetMap'
}).addTo(map);

/* MARKER SAWAH INTI */
L.marker([lat, lon]).addTo(map).bindPopup('📍 Titik Sawah Pengguna');

/* KONEKSI TILE LAYER SATELIT ASLI OPENWEATHERMAP */
owmTileLayers['awan'] = L.tileLayer(`https://tile.openweathermap.org/map/clouds_new/{z}/{x}/{y}.png?appid=${owmApiKey}`, { opacity: 0.55 });
owmTileLayers['hujan'] = L.tileLayer(`https://tile.openweathermap.org/map/precipitation_new/{z}/{x}/{y}.png?appid=${owmApiKey}`, { opacity: 0.65 });

// Aktifkan radar awan secara default di layar map
owmTileLayers['awan'].addTo(map);

/* =========================
   CHART ENGINE (CHART.JS MURNI)
========================= */
const ctx = document.getElementById('forecastChart').getContext('2d');
const forecastChart = new Chart(ctx,{
    type:'line',
    data:{
        labels:[],
        datasets:[{
            label:'Prediksi Hujan (mm)',
            data:[],
            tension:0.4,
            borderColor:'#00ff88',
            backgroundColor:'rgba(0,255,136,0.12)',
            fill:true,
            pointRadius: 2
        }]
    },
    options:{
        responsive:true,
        maintainAspectRatio:false,
        aspectRatio: false,
        layout: { padding: { left: -6, right: 4, top: 5, bottom: 0 } },
        plugins:{ legend:{ display: false }, tooltip: { mode: 'index', intersect: false } },
        scales:{
            x:{ ticks:{ color:'rgba(255,255,255,0.8)', font:{ size:9, weight:'bold' }, maxTicksLimit:6 }, grid:{ color:'rgba(255,255,255,0.03)' } },
            y:{ ticks:{ color:'rgba(255,255,255,0.8)', font:{ size:9, weight:'bold' }, beginAtZero:true }, grid:{ color:'rgba(255,255,255,0.03)' } }
        }
    }
});

/* =========================
   FUNGSI SAKLAR LAYER RADAR SATELIT
========================= */
function switchRadarLayer(mode, element) {
    // Hapus layer cuaca yang sedang aktif sebelumnya
    if (owmTileLayers[activeLayerName]) {
        map.removeLayer(owmTileLayers[activeLayerName]);
    }
    
    activeLayerName = mode;

    // Masukkan layer cuaca yang baru dipilih ke atas peta daratan
    if (owmTileLayers[mode]) {
        owmTileLayers[mode].addTo(map);
    }
    
    // Ganti class button aktif
    document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
    element.classList.add('active');
    
    document.getElementById('radarBadge').innerText = mode;
    
    // Sinkronisasi grafik bawah agar ikut berubah fungsinya
    updateChartData();
}

/* =========================
   SINKRONISASI UPDATE DATA GRAFIK
========================= */
let cachedHourlyData = null;

function updateChartData() {
    if (!cachedHourlyData) return;

    if (activeLayerName === 'angin') {
        forecastChart.data.datasets[0].label = 'Kecepatan Angin (km/j)';
        forecastChart.data.datasets[0].data = cachedHourlyData.wind_speed_10m.slice(0,24);
        forecastChart.data.datasets[0].borderColor = '#71f7ff';
        forecastChart.data.datasets[0].backgroundColor = 'rgba(113,247,255,0.12)';
        document.getElementById('chartTitle').innerText = '📈 Forecast Kecepatan Angin 24 Jam';
    } else {
        forecastChart.data.datasets[0].label = 'Prediksi Hujan (mm)';
        forecastChart.data.datasets[0].data = cachedHourlyData.rain.slice(0,24);
        forecastChart.data.datasets[0].borderColor = '#00ff88';
        forecastChart.data.datasets[0].backgroundColor = 'rgba(0,255,136,0.12)';
        document.getElementById('chartTitle').innerText = '📈 Forecast Perubahan Hujan 24 Jam';
    }

    forecastChart.options.maintainAspectRatio = false;
    forecastChart.options.aspectRatio = false;
    forecastChart.update();
    
    // Trik Pemaksa WebKit Safari iOS merender tinggi grafik secara penuh
    setTimeout(() => { forecastChart.resize(); }, 120);
}

/* =========================
   FETCHING PREDIKSI ANGKA (OPEN-METEO FOR GRAPH)
========================= */
async function loadForecastMetrics(){
    try {
        const api = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=rain,wind_speed_10m&timezone=auto`;
        const res = await fetch(api);
        const data = await res.json();
        
        cachedHourlyData = data.hourly;

        // Set Label Sumbu Jam X
        forecastChart.data.labels = data.hourly.time.slice(0,24).map(t => t.split("T")[1].slice(0,5));
        
        updateChartData();
    } catch (err) {
        console.error("Gagal sinkronisasi data metrik grafik:", err);
    }
}

// Eksekusi Pemicu Awal
loadForecastMetrics();
setInterval(loadForecastMetrics, 300000); // Auto sync data tiap 5 menit

</script>

</body>
</html>
