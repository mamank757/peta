<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1,
viewport-fit=cover">

<title>Smart Farm Cloud Radar Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/heatmap.js/2.0.0/heatmap.min.js"></script>

<script src="https://raw.githack.com/pa7/heatmap.js/master/plugins/leaflet-heatmap/leaflet-heatmap.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* =========================
   RESET
========================= */

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#08111f;
    font-family:Segoe UI,sans-serif;
}

/* =========================
   MAP IOS FIX
========================= */

#map{
    position:fixed;
    inset:0;
    width:100%;
    height:100vh;
    height:100dvh;
    z-index:1;
}

/* =========================
   FORECAST PANEL
========================= */

.forecast{
    position:absolute;
    bottom:15px;
    left:15px;
    z-index:1100;

    width:420px;
    max-width:calc(100% - 20px);

    box-sizing:border-box;

    padding:16px;

    border-radius:20px;

    background:rgba(8,15,30,0.92);

    -webkit-backdrop-filter:blur(22px);
    backdrop-filter:blur(22px);

    border:1px solid rgba(255,255,255,0.06);

    color:white;
}

.forecast-title{
    font-size:.95rem;
    font-weight:700;
    color:#71f7ff;
    margin-bottom:12px;
    text-align:center;
}

/* =========================
   CHART IOS SAFE
========================= */

.chart-container{
    position:relative;
    width:100%;
    height:220px;
    min-height:220px;
}

canvas{
    display:block;
    width:100% !important;
}

/* =========================
   LEGEND
========================= */

.legend{
    width:100%;
    margin-top:14px;
    box-sizing:border-box;
}

.gradient{
    width:100%;
    height:10px;
    border-radius:999px;

    background:linear-gradient(
        to right,
        rgba(0,140,255,0.15) 0%,
        #00ff88 30%,
        #ffd000 65%,
        #ff0000 100%
    );
}

.scale{
    display:flex;
    justify-content:space-between;
    margin-top:5px;
    font-size:.62rem;
    opacity:.9;
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

    .forecast{
        left:10px !important;
        right:10px !important;
        bottom:10px !important;

        width:auto !important;

        padding:14px 12px !important;

        border-radius:18px !important;
    }

    .forecast-title{
        font-size:.85rem !important;
        margin-bottom:8px !important;

        text-align:left !important;
    }

    .chart-container{
        height:180px !important;
        min-height:180px !important;
    }

    .legend{
        margin-top:12px !important;
        padding-top:8px !important;

        border-top:1px solid rgba(255,255,255,0.08);
    }

    .scale{
        font-size:.56rem !important;
    }

    .leaflet-control-zoom{
        margin-bottom:340px !important;
        transform:scale(.9);
    }

}

</style>
</head>

<body>

<div id="map"></div>

<div class="forecast">

    <div class="forecast-title">
        📈 Forecast Perubahan Cuaca Hujan 24 Jam
    </div>

    <div class="chart-container">
        <canvas id="forecastChart"></canvas>
    </div>

    <div class="legend">

        <div class="gradient"></div>

        <div class="scale">
            <span>🔵 Awan Tipis</span>
            <span>🟢 Berawan</span>
            <span>🟡 Mendung</span>
            <span>🔴 Pekat</span>
        </div>

    </div>

</div>

<script>

/* =========================
   URL PARAMS
========================= */

const urlParams = new URLSearchParams(window.location.search);

const lat =
parseFloat(urlParams.get('lat')) || -4.1200;

const lon =
parseFloat(urlParams.get('lon')) || 120.0300;

/* =========================
   MAP
========================= */

const map = L.map('map',{
    zoomControl:false
}).setView([lat, lon], 12);

L.control.zoom({
    position:'bottomright'
}).addTo(map);

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
{
    attribution:'© OpenStreetMap'
}
).addTo(map);

/* =========================
   MARKER
========================= */

L.marker([lat, lon])
.addTo(map)
.bindPopup('📍 Titik Lahan Sawah');

/* =========================
   RADAR RANGE
========================= */

L.circle([lat, lon],{
    radius:12000,
    color:'#71f7ff',
    fillColor:'#71f7ff',
    fillOpacity:0.02,
    weight:1.5
}).addTo(map);

/* =========================
   HEATMAP
========================= */

const cfg = {

    radius:0.05,

    maxOpacity:0.65,

    scaleRadius:true,

    useLocalExtrema:false,

    latField:'lat',

    lngField:'lng',

    valueField:'count',

    gradient:{
        0.15:'rgba(0,140,255,0.15)',
        0.35:'#00ff88',
        0.65:'#ffd000',
        1.00:'#ff0000'
    }

};

const heatmapLayer =
new HeatmapOverlay(cfg);

heatmapLayer.addTo(map);

/* =========================
   CHART
========================= */

const ctx =
document.getElementById('forecastChart')
.getContext('2d');

const forecastChart = new Chart(ctx,{

    type:'line',

    data:{
        labels:[],
        datasets:[{

            label:'Curah Hujan (mm)',

            data:[],

            tension:0.4,

            borderColor:'#00ff88',

            backgroundColor:'rgba(0,255,136,0.12)',

            fill:true,

            pointRadius:2,

            pointHoverRadius:5,

            borderWidth:2

        }]
    },

    options:{

        responsive:true,

        maintainAspectRatio:false,

        interaction:{
            mode:'index',
            intersect:false
        },

        layout:{
            padding:{
                left:0,
                right:6,
                top:6,
                bottom:0
            }
        },

        plugins:{

            legend:{
                display:false
            },

            tooltip:{
                mode:'index',
                intersect:false
            }

        },

        scales:{

            x:{

                ticks:{
                    color:'rgba(255,255,255,0.85)',
                    font:{
                        size:9,
                        weight:'bold'
                    },
                    maxRotation:0,
                    minRotation:0,
                    autoSkip:true,
                    maxTicksLimit:6
                },

                grid:{
                    color:'rgba(255,255,255,0.04)'
                }

            },

            y:{

                beginAtZero:true,

                ticks:{
                    color:'rgba(255,255,255,0.85)',
                    font:{
                        size:9,
                        weight:'bold'
                    }
                },

                grid:{
                    color:'rgba(255,255,255,0.04)'
                }

            }

        }

    }

});

/* =========================
   LOAD DATA
========================= */

async function loadData(){

    try{

        const step = 0.04;

        let lats = [];
        let lons = [];

        for(let i=-3;i<=3;i++){

            for(let j=-3;j<=3;j++){

                lats.push(
                    parseFloat((lat + i*step).toFixed(4))
                );

                lons.push(
                    parseFloat((lon + j*step).toFixed(4))
                );

            }

        }

        const api =
        `https://api.open-meteo.com/v1/forecast?`+
        `latitude=${lats.join(',')}`+
        `&longitude=${lons.join(',')}`+
        `&hourly=cloud_cover,rain`+
        `&timezone=auto`;

        const res = await fetch(api);

        const responses = await res.json();

        const sekarang = new Date();

        const jamISO =
        sekarang.toISOString().slice(0,13)+":00";

        const center = responses[0];

        const times = center.hourly.time;

        let activeIndex =
        times.findIndex(t =>
            t.startsWith(jamISO.slice(0,13))
        );

        if(activeIndex === -1){
            activeIndex = 0;
        }

        /* =========================
           UPDATE CHART
        ========================= */

        forecastChart.data.labels =
        center.hourly.time.slice(0,24).map(t => {

            const jam =
            t.split("T")[1];

            const parts =
            jam.split(":");

            return `${parts[0]}:${parts[1]}`;

        });

        forecastChart.data.datasets[0].data =
        center.hourly.rain.slice(0,24);

        forecastChart.update();

        /* =========================
           IOS FORCE RESIZE
        ========================= */

        setTimeout(() => {

            forecastChart.resize();

            forecastChart.update();

        }, 300);

        /* =========================
           RADAR MATRIX
        ========================= */

        let radarData = [];

        lats.forEach((gridLat,index)=>{

            const item = responses[index];

            const cloudVal =
            item.hourly.cloud_cover[activeIndex] || 0;

            let valNormalized =
            cloudVal / 100;

            valNormalized =
            Math.min(valNormalized,1);

            radarData.push({

                lat:gridLat,

                lng:lons[index],

                count:valNormalized

            });

        });

        heatmapLayer.setData({

            max:1,

            data:radarData

        });

    }

    catch(err){

        console.error(
        "Gagal memperbarui radar:",
        err
        );

    }

}

/* =========================
   INITIAL LOAD
========================= */

loadData();

setInterval(loadData,300000);

/* =========================
   IOS SAFARI FINAL FIX
========================= */

window.addEventListener('load',()=>{

    setTimeout(()=>{

        map.invalidateSize();

        forecastChart.resize();

        forecastChart.update();

    },500);

});

window.addEventListener('resize',()=>{

    setTimeout(()=>{

        map.invalidateSize();

        forecastChart.resize();

    },200);

});

</script>

</body>
</html>
